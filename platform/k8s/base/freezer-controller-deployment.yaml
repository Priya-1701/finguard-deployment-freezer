apiVersion: apps/v1
kind: Deployment
metadata:
  name: freezer-controller
  labels:
    app.kubernetes.io/name: freezer-controller
    app.kubernetes.io/part-of: finguard-deployment-freezer
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: freezer-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: freezer-controller
        app.kubernetes.io/part-of: finguard-deployment-freezer
    spec:
      containers:
        - name: freezer-controller
          image: finguard/freezer-controller:phase-6
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8010
          envFrom:
            - configMapRef:
                name: freezer-controller-config
          startupProbe:
            httpGet:
              path: /health
              port: 8010
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: 8010
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8010
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
