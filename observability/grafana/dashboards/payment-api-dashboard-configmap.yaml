apiVersion: v1
kind: ConfigMap
metadata:
  name: finguard-payment-api-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  payment-api-dashboard.json: |-
    {
      "id": null,
      "uid": "finguard-payment-api",
      "title": "FinGuard Payment API - Reliability Dashboard",
      "tags": ["finguard", "payment-api", "sre", "fintech"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "panels": [
        {
          "type": "stat",
          "title": "Payment API Target",
          "id": 1,
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
          "targets": [
            {
              "expr": "up{namespace=\"finguard\", job=\"payment-api\"}",
              "legendFormat": "up"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {"options": {"0": {"text": "DOWN"}, "1": {"text": "UP"}}, "type": "value"}
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "green", "value": 1}
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "type": "stat",
          "title": "Persisted Payments",
          "id": 2,
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
          "targets": [
            {
              "expr": "max(finguard_payment_store_size{namespace=\"finguard\"})",
              "legendFormat": "payments"
            }
          ]
        },
        {
          "type": "stat",
          "title": "5xx Error Rate %",
          "id": 3,
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0},
          "targets": [
            {
              "expr": "100 * sum(rate(finguard_http_requests_total{namespace=\"finguard\", status_code=~\"5..\"}[5m])) / sum(rate(finguard_http_requests_total{namespace=\"finguard\"}[5m]))",
              "legendFormat": "5xx %"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "orange", "value": 1},
                  {"color": "red", "value": 5}
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "type": "stat",
          "title": "p95 Latency",
          "id": 4,
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 0},
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(finguard_http_request_duration_seconds_bucket{namespace=\"finguard\"}[5m])) by (le))",
              "legendFormat": "p95"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "orange", "value": 0.3},
                  {"color": "red", "value": 0.5}
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "type": "timeseries",
          "title": "HTTP Request Rate",
          "id": 5,
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
          "targets": [
            {
              "expr": "sum by (path, status_code) (rate(finguard_http_requests_total{namespace=\"finguard\"}[5m]))",
              "legendFormat": "{{path}} - {{status_code}}"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "p95 Latency Over Time",
          "id": 6,
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4},
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(finguard_http_request_duration_seconds_bucket{namespace=\"finguard\"}[5m])) by (le))",
              "legendFormat": "p95 latency"
            }
          ],
          "fieldConfig": {
            "defaults": {"unit": "s"},
            "overrides": []
          }
        },
        {
          "type": "timeseries",
          "title": "Payments by Status",
          "id": 7,
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12},
          "targets": [
            {
              "expr": "sum by (status) (rate(finguard_payment_requests_total{namespace=\"finguard\"}[5m]))",
              "legendFormat": "{{status}}"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Payment Errors by Type",
          "id": 8,
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 12},
          "targets": [
            {
              "expr": "sum by (error_type) (rate(finguard_payment_errors_total{namespace=\"finguard\"}[5m]))",
              "legendFormat": "{{error_type}}"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Approved Payment Volume",
          "id": 9,
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 20},
          "targets": [
            {
              "expr": "sum by (currency) (rate(finguard_payment_amount_total{namespace=\"finguard\"}[5m]))",
              "legendFormat": "{{currency}}"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Persisted Payment Count",
          "id": 10,
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 20},
          "targets": [
            {
              "expr": "max(finguard_payment_store_size{namespace=\"finguard\"})",
              "legendFormat": "stored payments"
            }
          ]
        }
      ]
    }
